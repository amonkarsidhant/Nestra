<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nestra Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Manrope:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="stage">
      <p class="presence">
        <span class="presence-dot" id="presence-dot" aria-hidden="true"></span>
        <span id="presence-text">Nestra assistant online</span>
      </p>

      <section class="agent-shell" aria-label="Live assistant">
        <p class="agent-bubble" id="agent-bubble" aria-live="polite">Hello, I am here and listening.</p>
        <div class="human-agent idle" id="human-agent" aria-hidden="true">
          <div class="agent-head">
            <span class="agent-eye"></span>
            <span class="agent-eye"></span>
            <span class="agent-mouth"></span>
          </div>
          <div class="agent-body"></div>
          <div class="agent-aura"></div>
        </div>

        <p class="agent-state" id="agent-state-text">idle</p>
      </section>

      <section class="conversation" aria-label="Conversation">
        <div id="assistant-log" class="assistant-log" aria-live="polite"></div>
      </section>

      <section class="controls" aria-label="Assistant controls">
        <div class="mode-toggle" role="tablist" aria-label="Input mode">
          <button id="mode-text" class="mode active" type="button">Text</button>
          <button id="mode-voice" class="mode" type="button">Voice</button>
          <button id="tts-toggle" class="mode" type="button">Voice reply on</button>
        </div>

        <div class="command-row" id="text-row">
          <input
            id="nl-input"
            type="text"
            placeholder="Tell me what to do. Example: Good night and arm security"
            autocomplete="off"
          />
          <button id="nl-send-btn" type="button">Send</button>
        </div>

        <div class="voice-row hidden" id="voice-row">
          <button id="voice-btn" type="button">Start listening</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
